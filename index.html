<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bootstrap Calculator</title>

    <!-- Bootstrap 5.3 CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 500px">
      <!-- Display -->
      <input
        type="text"
        id="display"
        class="form-control mb-3 text-end"
        disabled
      />

      <!-- Buttons -->
      <div class="row g-2">
        <div class="col-3">
          <button class="btn btn-secondary w-100" onclick="clearDisplay()">
            C
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-secondary w-100" onclick="appendValue('/')">
            /
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-secondary w-100" onclick="appendValue('*')">
            *
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-secondary w-100" onclick="deleteLast()">
            ⌫
          </button>
        </div>

        <div class="col-3">
          <button class="btn btn-light w-100" onclick="appendValue('7')">
            7
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light w-100" onclick="appendValue('8')">
            8
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light w-100" onclick="appendValue('9')">
            9
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-secondary w-100" onclick="appendValue('-')">
            -
          </button>
        </div>

        <div class="col-3">
          <button class="btn btn-light w-100" onclick="appendValue('4')">
            4
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light w-100" onclick="appendValue('5')">
            5
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light w-100" onclick="appendValue('6')">
            6
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-secondary w-100" onclick="appendValue('+')">
            +
          </button>
        </div>

        <div class="col-3">
          <button class="btn btn-light w-100" onclick="appendValue('1')">
            1
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light w-100" onclick="appendValue('2')">
            2
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-light w-100" onclick="appendValue('3')">
            3
          </button>
        </div>
        <div class="col-3">
          <button class="btn btn-success w-100" onclick="calculate()">=</button>
        </div>

        <div class="col-6">
          <button class="btn btn-light w-100" onclick="appendValue('0')">
            0
          </button>
        </div>
        <div class="col-6">
          <button class="btn btn-light w-100" onclick="appendValue('.')">
            .
          </button>
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
